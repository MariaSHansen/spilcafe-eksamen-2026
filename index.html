<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spilcaféen</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  </head>

  <body>
    <header class="topbar">
      <img src="img/logo.webp" alt="Spilcaféen logo" class="topbar-logo"/>

      <nav class="topbar-nav">
        <button class="nav-btn">Menu</button>
        <button class="nav-btn" id="category-btn">Spil Kategori</button>
        <div class="mobile-search">
          <button id="open-search" class="search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>

          <div id="search-box" class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>

            <input id="search-input-mobile" type="search" placeholder="Søg"/>
              <button id="close-search">
                <i class="fa-solid fa-xmark"></i>
              </button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="controls category-panel">

        <div class="control-group">
          <label for="genre-select">Genre</label>
          <select id="genre-select">
            <option value="all">Alle genrer</option>
          </select>
        </div>
      </section>

      <section class="status-bar">
        <p id="game-count">Viser 0 spil</p>
      </section>

      <section id="game-list" class="game-grid">
        <p class="loading">Loader spil...</p>
      </section>
    </main>

    <!-- Game Detail Dialog -->
    <dialog id="game-dialog">
      <form method="dialog">
        <button id="close-dialog" aria-label="Luk">✕</button>
        <div id="dialog-content">
          
          <!-- Spildetaljer indsættes her via JavaScript -->
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
